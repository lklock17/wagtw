name: Deploy Admin to GitHub Pages

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Admin
        run: npm run build --workspace=apps/admin
        env:
          VITE_API_URL: https://wagtw-api-lkl-a44634725bb8.herokuapp.com/api

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/admin/dist
          branch: gh-pages
